name: Release
on:
  release:
    types: [published]
jobs:
  create:
    name: "Create"
    runs-on: macos-latest
    env:
      GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: BuildAndPackage
        id: build-package
        uses: 4d/build4d-action@main
        with:
          actions: "clean,build,pack,archive"
          product-line: vcs
          version: vcs
          build: official
          token: ${{ secrets.DLTK }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ github.event.repository.name }}.zip"
          path: "build/${{ github.event.repository.name }}.zip"
          retention-days: 1
          if-no-files-found: error

  publish:
    needs: create
    name: "Publish package"
    runs-on: ubuntu-latest
    permissions:
      contents: write # for asset upload
    steps:
      - name: 📄 Checkout repository
        uses: "actions/checkout@v4"
        with:
          fetch-depth: 0
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: "${{ github.event.repository.name }}.zip"
          path: artifact
      - name: 📦 release package
        run: |
          gh release upload ${{github.event.release.tag_name}} "${{github.workspace}}/artifact/${{ github.event.repository.name }}.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
